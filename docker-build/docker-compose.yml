services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thalos}
      POSTGRES_USER: ${POSTGRES_USER:-thalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thalos_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thalos} -d ${POSTGRES_DB:-thalos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      THALOS_DB_DSN: "postgresql://${POSTGRES_USER:-thalos}:${POSTGRES_PASSWORD:-thalos_password}@db:5432/${POSTGRES_DB:-thalos}"
      THALOS_DB_CONNECT_TIMEOUT: ${THALOS_DB_CONNECT_TIMEOUT:-10}
      MNN_API_HOST: "0.0.0.0"
      MNN_API_PORT: "8000"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
