services:
  # PostgreSQL database for ThalosBridge
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thalos}
      POSTGRES_USER: ${POSTGRES_USER:-thalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thalos_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/relational_buffer_schema.sql:/docker-entrypoint-initdb.d/relational_buffer_schema.sql:ro
      - ./thalos_db_schema.sql:/docker-entrypoint-initdb.d/thalos_db_schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thalos} -d ${POSTGRES_DB:-thalos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # MNN Pipeline FastAPI service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        THALOS_DB_DSN: ${THALOS_DB_DSN:-}
        THALOS_DB_CONNECT_TIMEOUT: ${THALOS_DB_CONNECT_TIMEOUT:-10}
    environment:
      THALOS_DB_DSN: ${THALOS_DB_DSN:-}
      THALOS_DB_CONNECT_TIMEOUT: ${THALOS_DB_CONNECT_TIMEOUT:-10}
      THALOS_HARDWARE_ID: ${THALOS_HARDWARE_ID:-}
      MNN_API_HOST: ${MNN_API_HOST:-0.0.0.0}
      MNN_API_PORT: ${MNN_API_PORT:-8000}
      MNN_AUTH_SECRET: ${MNN_AUTH_SECRET:-mnn-dev-secret-change-me}
      MNN_ADMIN_USERNAME: ${MNN_ADMIN_USERNAME:-admin}
      MNN_ADMIN_PASSWORD: ${MNN_ADMIN_PASSWORD:-admin123!}
      MNN_TOKEN_EXPIRE_MINUTES: ${MNN_TOKEN_EXPIRE_MINUTES:-120}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --http-port=8080
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123!}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
