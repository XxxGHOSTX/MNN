name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '17 21 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Use macOS only if you add Swift later; otherwise ubuntu is used
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}

    permissions:
      # required for all CodeQL workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # recommended for private repos
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub Actions workflow analysis
          - language: actions
            build-mode: none

          # C/C++ analysis for your C++ code
          - language: c-cpp
            build-mode: autobuild

          # JavaScript analysis for your frontend (Vite + React)
          - language: javascript-typescript
            build-mode: none

          # Python analysis for your Python code
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Toolchain setup ---

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install C/C++ toolchain
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # --- Optional dependency installs for better analysis fidelity ---

      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          fi

      - name: Install frontend dependencies
        if: matrix.language == 'javascript-typescript'
        working-directory: frontend
        run: |
          if [ -f package-lock.json ] || [ -f package.json ]; then
            npm install
          fi

      # --- Initialize CodeQL ---

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # To enable a broader set of checks, uncomment this line:
          # queries: +security-extended,security-and-quality

      # --- Manual build hook (not used right now, only if you change build-mode to "manual") ---

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo 'build-mode is "manual" but no build commands are configured.'
          echo 'If you change a language entry to build-mode: manual, replace this step with the commands to build your code.'
          exit 1

      # --- Run analysis ---

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
