name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run linting
        run: |
          python -m compileall .

  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m py_compile api.py
          python -m py_compile main.py
          python -m py_compile middleware.py
          python -m py_compile weight_encryptor.py
          python -m py_compile manual_validation.py
          python -m py_compile config.py
          python -m py_compile logging_config.py
          python -m py_compile security.py
          find mnn_pipeline -name "*.py" -exec python -m py_compile {} +
          find tests -name "*.py" -exec python -m py_compile {} +
      
      - name: Run tests
        run: |
          python -m pytest

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: thalos
          POSTGRES_USER: thalos
          POSTGRES_PASSWORD: thalos_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t mnn-pipeline:test .
      
      - name: Create Docker network
        run: |
          docker network create mnn-test-network
      
      - name: Connect postgres service to custom network
        run: |
          # Find and connect the postgres service container to our custom network
          POSTGRES_CONTAINER=$(docker ps --filter "ancestor=postgres:16-alpine" --format "{{.ID}}")
          if [ -n "$POSTGRES_CONTAINER" ]; then
            echo "Connecting postgres container $POSTGRES_CONTAINER to mnn-test-network"
            docker network connect mnn-test-network $POSTGRES_CONTAINER --alias postgres
          else
            echo "Warning: postgres container not found"
          fi
      
      - name: Run container
        run: |
          docker run -d \
            --name mnn-test \
            --network mnn-test-network \
            -p 8000:8000 \
            -e THALOS_DB_DSN="postgresql://thalos:thalos_password@postgres:5432/thalos" \
            mnn-pipeline:test
      
      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to become healthy..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "API is healthy!"
              break
            fi
            echo "Attempt $i/30: API not ready yet, waiting..."
            sleep 2
          done
      
      - name: Smoke test - Health endpoint
        run: |
          response=$(curl -s http://localhost:8000/health)
          echo "Health check response: $response"
          echo "$response" | grep -q "healthy" || exit 1
      
      - name: Smoke test - Root endpoint
        run: |
          response=$(curl -s http://localhost:8000/)
          echo "Root endpoint response: $response"
          echo "$response" | grep -q "MNN Knowledge Engine" || exit 1
      
      - name: Smoke test - Query endpoint
        run: |
          set -euo pipefail
          response=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8000/query \
            -H "Content-Type: application/json" \
            -d '{"query":"artificial intelligence"}')
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Query response body: $body"
          echo "HTTP status code: $status"
          # Verify status is 200
          if [ "$status" != "200" ]; then
            echo "ERROR: Expected status 200, got $status"
            exit 1
          fi
          # Verify response is valid JSON and has expected structure using Python
          echo "$body" | python3 -c "import sys, json; data = json.load(sys.stdin); assert 'results' in data and 'count' in data, 'Missing required fields'; print('✓ Valid JSON with results and count fields')"
          echo "Smoke test passed: Status 200, valid JSON response"
      
      - name: Check container logs
        if: always()
        run: |
          echo "=== Container logs ==="
          docker logs mnn-test
      
      - name: Stop container
        if: always()
        run: |
          docker stop mnn-test || true
          docker rm mnn-test || true
