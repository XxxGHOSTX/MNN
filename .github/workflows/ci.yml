name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-hermetic:
    name: Build Hermetic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify host variance baseline
        run: python scripts/verify_host_variance.py --strict

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate Nix flake
        run: nix flake check ./devops/nix

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify deterministic Docker artifact
        run: bash scripts/verify_docker_reproducibility.sh

      - name: Hermetic smoke test endpoints
        run: |
          set -euo pipefail
          docker run --rm -d -p 8000:8000 --name mnn-hermetic-smoke mnn-hermetic:build-a
          for i in {1..30}; do
            if curl -sSf http://localhost:8000/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sSf http://localhost:8000/health >/dev/null
          curl -sSf http://localhost:8000/api/version >/dev/null
          docker stop mnn-hermetic-smoke

      - name: Deterministic output check
        run: python tools/reproducibility_check.py --query "deterministic systems"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run linting
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: make test

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run verification agent
        run: python -m tools.verify

      - name: Compile C++ core
        run: g++ -std=c++17 -Iinclude -c src/mnn_core.cpp -o /tmp/mnn_core_ci.o

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification_report.json

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test, verify]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: thalos
          POSTGRES_USER: thalos
          POSTGRES_PASSWORD: thalos_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t mnn-pipeline:test .
      
      - name: Create Docker network
        run: |
          docker network create mnn-test-network
      
      - name: Run container
        run: |
          docker run -d \
            --name mnn-test \
            --network mnn-test-network \
            -p 8000:8000 \
            -e THALOS_DB_DSN="postgresql://thalos:thalos_password@host.docker.internal:5432/thalos" \
            --add-host host.docker.internal:host-gateway \
            mnn-pipeline:test
      
      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to become healthy..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "API is healthy!"
              break
            fi
            echo "Attempt $i/30: API not ready yet, waiting..."
            sleep 2
            if [ "$i" -eq 30 ]; then
              echo "ERROR: API did not become healthy within 60 seconds"
              docker logs mnn-test
              exit 1
            fi
          done
      
      - name: Smoke test - Health endpoint
        run: |
          response=$(curl -s http://localhost:8000/health)
          echo "Health check response: $response"
          echo "$response" | grep -q "healthy" || exit 1
      
      - name: Smoke test - Root endpoint
        run: |
          response=$(curl -s http://localhost:8000/)
          echo "Root endpoint response: $response"
          echo "$response" | grep -q "MNN Knowledge Engine" || exit 1
      
      - name: Smoke test - Query endpoint
        run: |
          set -euo pipefail
          response=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8000/query \
            -H "Content-Type: application/json" \
            -d '{"query":"artificial intelligence"}')
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Query response body: $body"
          echo "HTTP status code: $status"
          # Verify status is 200
          if [ "$status" != "200" ]; then
            echo "ERROR: Expected status 200, got $status"
            exit 1
          fi
          # Verify response is valid JSON and has expected structure using Python
          echo "$body" | python3 -c "import sys, json; data = json.load(sys.stdin); assert 'results' in data and 'count' in data, 'Missing required fields'; print('✓ Valid JSON with results and count fields')"
          echo "Smoke test passed: Status 200, valid JSON response"

      - name: Smoke test - Auth and dashboard flow
        run: |
          set -euo pipefail
          login=$(curl -s -X POST http://localhost:8000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123!"}')
          token=$(echo "$login" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          curl -s -H "Authorization: Bearer ${token}" http://localhost:8000/auth/me | python3 -c "import sys,json; data=json.load(sys.stdin); assert data['username']=='admin'"
          curl -s -H "Authorization: Bearer ${token}" http://localhost:8000/dashboard/overview | python3 -c "import sys,json; data=json.load(sys.stdin); assert 'infra' in data and 'metrics' in data"
      
      - name: Check container logs
        if: always()
        run: |
          echo "=== Container logs ==="
          docker logs mnn-test
      
      - name: Stop container
        if: always()
        run: |
          docker stop mnn-test || true
          docker rm mnn-test || true

  supply-chain:
    name: Supply Chain Checks
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install audit and SBOM tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit cyclonedx-bom

      - name: Run dependency audit
        run: pip-audit -r requirements.txt

      - name: Generate SBOM
        run: cyclonedx-py requirements -i requirements.txt -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  deploy:
    name: Deploy Docker image
    runs-on: ubuntu-latest
    needs: [build-hermetic, frontend-build, lint, test, verify, docker-smoke, supply-chain]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare lowercase image name
        id: image_name
        run: echo "image_repo=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mnn-pipeline" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image_name.outputs.image_repo }}:latest
            ${{ steps.image_name.outputs.image_repo }}:${{ github.sha }}
