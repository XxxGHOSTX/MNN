name: Automation Baseline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-test:
    name: Lint / Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential python3-venv

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pre-commit pip-audit "coverage[toml]" cyclonedx-bom

      - name: Run pre-commit (lint / format / typecheck)
        run: pre-commit run --all-files

      - name: Run pytest with coverage
        run: |
          coverage run -m pytest
          coverage xml
          coverage report || true
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: Run pip-audit
        run: pip-audit
        continue-on-error: true

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py -r -j -o sbom-${{ matrix.python-version }}.json || true
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.python-version }}
          path: sbom-${{ matrix.python-version }}.json
        continue-on-error: true

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs-${{ matrix.python-version }}
          path: |
            .pytest_cache
            tests/.pytest_cache
          if-no-files-found: ignore

  cpp-build:
    name: C++ Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile C++ core
        run: g++ -std=c++17 -Iinclude -c src/mnn_core.cpp

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t mnn:local .

      - name: Run container
        run: |
          docker run -d --name mnn-smoke \
            -e THALOS_DB_DSN=${{ secrets.THALOS_DB_DSN }} \
            mnn:local
          sleep 10

      - name: Check container logs
        run: docker logs mnn-smoke

      - name: Stop container
        if: always()
        run: |
          docker stop mnn-smoke || true
          docker rm mnn-smoke || true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python
